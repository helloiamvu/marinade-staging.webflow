          const position = buttonElement.getAttribute('data-position');
          const text = buttonElement.getAttribute('data-text') || buttonElement.innerText;
          window.dataLayer = window.dataLayer || [];
          window.dataLayer.push({
              event: "buttonClick",
              button: {
                  category: category,
                  subcategory: subcategory,
                  position: position,
                  text: text
              }
          });
      }
      // Attach event listeners to all buttons with the 'ga-button' class
      const gaButtons = document.querySelectorAll('.ga-button');
      gaButtons.forEach(function (button) {
          button.addEventListener('click', function () {
              trackButtonClick(button);
          });
      });

                entrySOLBalance: "not_available_DL"

        console.error('Error fetching user location:', error);
      });

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("wf-form-Modal-Email");
    const emailInput = document.getElementById("Modal-Email-3");
    if (!form || !emailInput || typeof MutationObserver === "undefined") return;
    let hasTracked = false; // prevent double tracking
    const observer = new MutationObserver((mutationsList) => {
      if (hasTracked) return;
      for (const mutation of mutationsList) {
        if (mutation.type === "childList") {
          const successNode = Array.from(mutation.addedNodes).find(
            (node) =>
              node.nodeType === 1 &&
              typeof node.innerText === "string" &&
              node.innerText.toLowerCase().includes("thank")
          );
          if (successNode) {
            const email = emailInput.value.trim();
            if (email && typeof mixpanel !== "undefined") {
              mixpanel.people.set({ $email: email });
              mixpanel.track("email_form_submit", { email: email });
              hasTracked = true;
              observer.disconnect();
              break;
            }
          }
        }
      }
    });
    observer.observe(form, { childList: true, subtree: true });
  });
</script>
